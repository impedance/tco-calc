# .github/workflows/deploy.yml
# Автоматическая сборка и деплой на GitHub Pages

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Срабатывает при пуше в основную ветку

permissions:
  contents: write  # Права на запись в репозиторий для деплоя на gh-pages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies 📦
        run: npm install

      - name: Build project 🏗️
        run: npm run build

      - name: Deploy to GitHub Pages 🚀
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true  # Создаёт чистую историю в ветке деплоя
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
