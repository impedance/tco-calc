# .gitlab-ci.yml
# Конфигурация для деплоя на GitLab Pages

image: node:24

# Определение этапов
stages:
  - deploy

pages:
  stage: deploy
  tags:
    - docker # Добавили тег из проекта gostpdf, чтобы раннер подхватил задачу
  script:
    - npm install
    - npm run build
    - rm -rf public
    - mv dist public # GitLab Pages ожидает контент в директории 'public'
  artifacts:
    paths:
      - public
  only:
    - main # Срабатывает при пуше в ветку main
